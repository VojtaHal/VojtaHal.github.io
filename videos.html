    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            min-height: 100vh;
        }
        
        /* Navigation */
        nav {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 3rem;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 0.5rem 1.5rem;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        nav a:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        nav a.active {
            background-color: rgba(255, 255, 255, 0.3);
        }
        
        /* Page Header */
        .page-header {
            text-align: center;
            padding: 3rem 2rem;
        }
        
        .page-header h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ffeb3b;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        /* Video Gallery */
        .video-gallery {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }
        
        .video-item {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .video-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }
        
        .video-item video {
            width: 100%;
            height: auto;
            display: block;
            background-color: black;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .video-gallery {
                grid-template-columns: 1fr;
            }
            
            .page-header h1 {
                font-size: 2rem;
            }
            
            nav ul {
                gap: 1rem;
            }
            
            nav a {
                font-size: 1rem;
                padding: 0.4rem 1rem;
            }
        }
    </style>
</head>
