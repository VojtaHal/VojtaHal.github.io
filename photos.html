<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos - Vojtech Halamek</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            min-height: 100vh;
        }
        
        /* Navigation */
        nav {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 3rem;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 0.5rem 1.5rem;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        nav a:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        nav a.active {
            background-color: rgba(255, 255, 255, 0.3);
        }
        
        /* Page Header */
        .page-header {
            text-align: center;
            padding: 3rem 2rem;
        }
        
        .page-header h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ffeb3b;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        /* Photo Gallery */
        .photo-gallery {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }
        
        .photo-item {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .photo-item:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }
        
        .photo-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .photo-gallery {
                grid-template-columns: 1fr;
            }
            
            .page-header h1 {
                font-size: 2rem;
            }
            
            nav ul {
                gap: 1rem;
            }
            
            nav a {
                font-size: 1rem;
                padding: 0.4rem 1rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="videos.html">VIDEOS</a></li>
            <li><a href="photos.html" class="active">PHOTOS</a></li>
        </ul>
    </nav>
    
    <div class="page-header">
        <h1>📸 PHOTO GALLERY</h1>
    </div>
    
    <div class="photo-gallery">
        <div class="photo-item">
            <img src="images/photo1.jpg" alt="Tennis Photo 1">
        </div>
        <div class="photo-item">
            <img src="images/photo2.jpg" alt="Tennis Photo 2">
        </div>
        <div class="photo-item">
            <img src="images/photo3.jpg" alt="Tennis Photo 3">
        </div>
        <div class="photo-item">
            <img src="images/photo4.jpg" alt="Tennis Photo 4">
        </div>
        <div class="photo-item">
            <img src="images/photo5.jpg" alt="Tennis Photo 5">
        </div>
        <div class="photo-item">
            <img src="images/photo6.jpg" alt="Tennis Photo 6">
        </div>
        <div class="photo-item">
            <img src="images/photo7.jpg" alt="Tennis Photo 7">
        </div>
        <div class="photo-item">
            <img src="images/photo8.jpg" alt="Tennis Photo 8">
        </div>
        <div class="photo-item">
            <img src="images/photo9.jpg" alt="Tennis Photo 9">
        </div>
        <div class="photo-item">
            <img src="images/photo10.jpg" alt="Tennis Photo 10">
        </div>
        <div class="photo-item">
            <img src="images/photo11.jpg" alt="Tennis Photo 11">
        </div>
    </div>
</body>
</html>
